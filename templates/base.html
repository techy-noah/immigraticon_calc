<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EB1/EB2 Profile Intelligence Report{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased min-h-screen flex flex-col">
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-18 flex items-center justify-between py-4">
            <a href="{% url 'assessments:landing' %}" class="flex items-center gap-2">
                <span class="text-2xl font-extrabold text-blue-700 tracking-tight">Immigration<span class="text-slate-800">Intel</span></span>
            </a>
            <nav class="hidden md:flex gap-8 items-center">
                <a href="#" class="text-sm font-semibold text-slate-600 hover:text-blue-600 transition-colors">How it Works</a>
                <a href="#" class="text-sm font-semibold text-slate-600 hover:text-blue-600 transition-colors">Pricing</a>
                <a href="{% url 'assessments:form' %}" class="text-sm font-semibold bg-blue-600 text-white px-5 py-2.5 rounded-xl hover:bg-blue-700 hover:shadow-md transition-all">Start Assessment</a>
            </nav>
        </div>
    </header>

    <main class="flex-grow">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-slate-900 text-slate-300 py-12 mt-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-sm">
            &copy; 2026 ImmigrationIntel. All rights reserved.
        </div>
    </footer>
</body>
</html>
